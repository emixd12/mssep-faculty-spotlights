<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MSSEP Faculty Spotlight Video Carousel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      background: #fff;
    }

    .video-carousel {
      max-width: 760px;
      margin: 0 auto;
      padding: 0;
    }

    .carousel-stage {
      background: #efefef;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-caption {
      background: #4e2a84;
      color: #fff;
      padding: 14px 20px;
      font-size: 1rem;
      font-style: italic;
      line-height: 1.35;
    }

    .carousel-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 16px;
      padding-bottom: 6px;
    }

    .carousel-button {
      border: 0;
      background: transparent;
      color: #4e2a84;
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1;
      padding: 4px 8px;
      cursor: pointer;
    }

    .carousel-button:hover,
    .carousel-button:focus {
      color: #32185f;
      outline: 3px solid #cfc3e9;
      outline-offset: 2px;
    }

    .carousel-dots {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .dot-button {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #4e2a84;
      background: #fff;
      padding: 0;
      cursor: pointer;
    }

    .dot-button[aria-current="true"] {
      background: #4e2a84;
    }

    .dot-button:hover,
    .dot-button:focus {
      outline: 3px solid #cfc3e9;
      outline-offset: 2px;
    }

    @media (max-width: 640px) {
      .video-caption {
        padding: 12px 16px;
        font-size: 0.95rem;
      }

      .carousel-controls {
        gap: 12px;
      }

      .carousel-button {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <div class="video-carousel" aria-label="MSSEP Faculty Spotlight video carousel">
    <div class="carousel-stage">
      <div class="video-frame">
        <iframe
          id="video-player"
          src="https://www.youtube-nocookie.com/embed/-rIZz4AS8B0"
          title="MSSEP Faculty Spotlight: Michelle Yin"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>

      <div class="video-caption" id="video-caption" aria-live="polite">
        MSSEP Faculty Spotlight: Michelle Yin
      </div>
    </div>

    <div class="carousel-controls">
      <button class="carousel-button" type="button" id="prev-button" aria-label="Show previous faculty spotlight video">
        &#8249;
      </button>

      <div class="carousel-dots" aria-label="Faculty spotlight videos">
        <button class="dot-button" type="button" aria-current="true" data-index="0" aria-label="Show Michelle Yin faculty spotlight video"></button>
        <button class="dot-button" type="button" aria-current="false" data-index="1" aria-label="Show Ofer Malamud faculty spotlight video"></button>
        <button class="dot-button" type="button" aria-current="false" data-index="2" aria-label="Show Scott Ogawa faculty spotlight video"></button>
      </div>

      <button class="carousel-button" type="button" id="next-button" aria-label="Show next faculty spotlight video">
        &#8250;
      </button>
    </div>
  </div>

  <script>
    const videos = [
      {
        id: "-rIZz4AS8B0",
        title: "MSSEP Faculty Spotlight: Michelle Yin"
      },
      {
        id: "LJA5iXXcJX8",
        title: "MSSEP Faculty Spotlight: Ofer Malamud"
      },
      {
        id: "VQ5-TPZ9rZk",
        title: "MSSEP Faculty Spotlight: Scott Ogawa"
      }
    ];

    let currentIndex = 0;

    const player = document.getElementById("video-player");
    const caption = document.getElementById("video-caption");
    const dots = document.querySelectorAll(".dot-button");

    function showVideo(index) {
      currentIndex = (index + videos.length) % videos.length;
      const video = videos[currentIndex];

      player.src = `https://www.youtube-nocookie.com/embed/${video.id}`;
      player.title = video.title;
      caption.textContent = video.title;

      dots.forEach((button, buttonIndex) => {
        button.setAttribute("aria-current", buttonIndex === currentIndex ? "true" : "false");
      });
    }

    document.getElementById("prev-button").addEventListener("click", () => {
      showVideo(currentIndex - 1);
    });

    document.getElementById("next-button").addEventListener("click", () => {
      showVideo(currentIndex + 1);
    });

    dots.forEach((button) => {
      button.addEventListener("click", () => {
        showVideo(Number(button.dataset.index));
      });
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MSSEP Faculty Spotlight Video Carousel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      background: #fff;
    }

    .video-carousel {
      max-width: 760px;
      margin: 0 auto;
      padding: 0;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-caption {
      margin-top: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .carousel-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .carousel-button {
      border: 2px solid #4e2a84;
      background: #4e2a84;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
      min-width: 110px;
    }

    .carousel-button:hover,
    .carousel-button:focus {
      background: #32185f;
      border-color: #32185f;
      outline: 3px solid #cfc3e9;
      outline-offset: 2px;
    }

    .video-thumbnails {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 2px 0;
      flex: 1;
    }

    .thumbnail-button {
      border: 3px solid transparent;
      background: none;
      padding: 0;
      cursor: pointer;
      min-width: 140px;
      text-align: left;
    }

    .thumbnail-button[aria-current="true"] {
      border-color: #4e2a84;
    }

    .thumbnail-button:focus {
      outline: 3px solid #cfc3e9;
      outline-offset: 2px;
    }

    .thumbnail-button img {
      display: block;
      width: 100%;
      height: auto;
    }

    .thumbnail-title {
      display: block;
      margin-top: 4px;
      font-size: 0.8rem;
      line-height: 1.3;
      color: #111;
    }

    @media (max-width: 640px) {
      .carousel-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .video-thumbnails {
        order: -1;
      }

      .carousel-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="video-carousel" aria-label="MSSEP Faculty Spotlight video carousel">
    <div class="video-frame">
      <iframe
        id="video-player"
        src="https://www.youtube-nocookie.com/embed/-rIZz4AS8B0"
        title="MSSEP Faculty Spotlight: Michelle Yin"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

    <div class="video-caption" id="video-caption">
      MSSEP Faculty Spotlight: Michelle Yin
    </div>

    <div class="carousel-controls">
      <button class="carousel-button" type="button" id="prev-button">
        Previous
      </button>

      <div class="video-thumbnails" aria-label="Faculty spotlight videos">
        <button class="thumbnail-button" type="button" aria-current="true" data-index="0" aria-label="Show Michelle Yin faculty spotlight video">
          <img src="https://img.youtube.com/vi/-rIZz4AS8B0/hqdefault.jpg" alt="">
          <span class="thumbnail-title">Michelle Yin</span>
        </button>

        <button class="thumbnail-button" type="button" aria-current="false" data-index="1" aria-label="Show Ofer Malamud faculty spotlight video">
          <img src="https://img.youtube.com/vi/LJA5iXXcJX8/hqdefault.jpg" alt="">
          <span class="thumbnail-title">Ofer Malamud</span>
        </button>

        <button class="thumbnail-button" type="button" aria-current="false" data-index="2" aria-label="Show Scott Ogawa faculty spotlight video">
          <img src="https://img.youtube.com/vi/VQ5-TPZ9rZk/hqdefault.jpg" alt="">
          <span class="thumbnail-title">Scott Ogawa</span>
        </button>
      </div>

      <button class="carousel-button" type="button" id="next-button">
        Next
      </button>
    </div>
  </div>

  <script>
    const videos = [
      {
        id: "-rIZz4AS8B0",
        title: "MSSEP Faculty Spotlight: Michelle Yin"
      },
      {
        id: "LJA5iXXcJX8",
        title: "MSSEP Faculty Spotlight: Ofer Malamud"
      },
      {
        id: "VQ5-TPZ9rZk",
        title: "MSSEP Faculty Spotlight: Scott Ogawa"
      }
    ];

    let currentIndex = 0;

    const player = document.getElementById("video-player");
    const caption = document.getElementById("video-caption");
    const thumbnails = document.querySelectorAll(".thumbnail-button");

    function showVideo(index) {
      currentIndex = (index + videos.length) % videos.length;
      const video = videos[currentIndex];

      player.src = `https://www.youtube-nocookie.com/embed/${video.id}`;
      player.title = video.title;
      caption.textContent = video.title;

      thumbnails.forEach((button, buttonIndex) => {
        button.setAttribute("aria-current", buttonIndex === currentIndex ? "true" : "false");
      });
    }

    document.getElementById("prev-button").addEventListener("click", () => {
      showVideo(currentIndex - 1);
    });

    document.getElementById("next-button").addEventListener("click", () => {
      showVideo(currentIndex + 1);
    });

    thumbnails.forEach((button) => {
      button.addEventListener("click", () => {
        showVideo(Number(button.dataset.index));
      });
    });
  </script>
</body>
</html>
